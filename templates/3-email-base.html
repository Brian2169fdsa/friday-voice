<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!--[if mso]><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml><![endif]-->
  <!-- INJECT: email_subject -->
  <title><!-- INJECT: email_subject --></title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; }
    body, table, td, p, a, li { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    a { color: #4A8FD6; }
  </style>
</head>
<body style="margin:0;padding:0;background:#ECEEF2;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;">

<!-- ═══════════════════════════════════════════════════════
     MANAGEAI EMAIL TEMPLATE — v1.0 LOCKED
     Agent fills INJECT blocks only. Never change structure.
     
     INJECT POINTS:
       email_subject        — browser title + preheader
       preheader_text       — preview text shown by email clients
       badge_text           — e.g. "WEEKLY REPORT" / "BUILD COMPLETE" / "DAILY ALERT"
       badge_color          — hex: #22A860 success / #4A8FD6 info / #E5A200 warning / #EF4444 danger
       report_date          — formatted: "March 5, 2026"
       headline             — bold H1 line
       subheadline          — lighter supporting line under H1
       intro_paragraph      — 1–3 sentence intro (HTML-safe text)
       stat_1_value/label/color  — first stat block (remove row if unused)
       stat_2_value/label/color
       stat_3_value/label/color
       stat_4_value/label/color
       section_1_label      — e.g. "ACTION ITEMS" / "THIS WEEK'S HIGHLIGHTS"
       section_1_content    — HTML content block (use row templates below)
       section_2_label      — optional
       section_2_content    — optional (remove tr if unused)
       cta_primary_url      — primary button href
       cta_primary_label    — primary button text
       cta_secondary_url    — secondary button href (remove td if unused)
       cta_secondary_label  — secondary button text
       sender_name          — e.g. "F.R.I.D.A.Y." / "ManageAI"
       sender_role          — e.g. "Autonomous Intelligence Engine"
       footer_client        — recipient company name
     
     CONTENT ROW TEMPLATES (paste into section_content):
       Alert row:
         <tr><td style="padding:6px 0;">
           <table width="100%"><tr>
             <td width="80" style="padding:8px 12px;border-radius:4px 0 0 4px;background:{color}15;border-left:3px solid {color};">
               <span style="font-family:Courier New,monospace;font-size:10px;font-weight:700;color:{color};text-transform:uppercase;">{badge}</span></td>
             <td style="padding:8px 12px;background:#F8F9FB;border-radius:0 4px 4px 0;font-size:13px;color:#5A6070;line-height:1.5;">{text}</td>
           </tr></table></td></tr>
       
       Bullet row:
         <tr><td style="padding:4px 0;font-size:13px;color:#5A6070;line-height:1.6;">
           <span style="color:#4A8FD6;font-weight:700;margin-right:8px;">→</span>{text}</td></tr>
       
       Divider:
         <tr><td style="padding:8px 0;"><div style="height:1px;background:#E2E5EA;"></div></td></tr>
     
═══════════════════════════════════════════════════════ -->

  <!-- Preheader -->
  <div style="display:none;font-size:1px;color:#ECEEF2;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;"><!-- INJECT: preheader_text -->&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" bgcolor="#ECEEF2">
    <tr><td align="center" style="padding:32px 16px;">

      <!-- Card -->
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

        <!-- ── TOP ACCENT BAR ── -->
        <tr>
          <td style="height:4px;border-radius:8px 8px 0 0;font-size:0;line-height:0;"
              bgcolor="#4A8FD6"><!--[if mso]>&nbsp;<![endif]--></td>
        </tr>

        <!-- ── HEADER ── -->
        <tr>
          <td style="background:#1A1D27;padding:20px 28px;border-left:1px solid #2A2F45;border-right:1px solid #2A2F45;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td valign="middle">
                  <!-- Logo -->
                  <span style="font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:16px;font-weight:700;letter-spacing:-0.01em;">
                    <span style="color:#FFFFFF;">MANAGE</span><span style="color:#4A8FD6;">AI</span>
                  </span>
                </td>
                <td align="right" valign="middle">
                  <!-- Badge -->
                  <!-- INJECT: badge_color into background and color below -->
                  <span style="display:inline-block;font-family:Courier New,monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:4px 10px;border-radius:4px;background:<!-- INJECT: badge_color -->22;color:<!-- INJECT: badge_color -->;border:1px solid <!-- INJECT: badge_color -->44;"><!-- INJECT: badge_text --></span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ── HERO BLOCK ── -->
        <tr>
          <td style="background:#FFFFFF;padding:28px 28px 22px;border-left:1px solid #E2E5EA;border-right:1px solid #E2E5EA;">
            <!-- Date line -->
            <p style="margin:0 0 8px;font-family:Courier New,monospace;font-size:10px;font-weight:600;color:#8890A0;letter-spacing:0.1em;text-transform:uppercase;"><!-- INJECT: report_date --></p>
            <!-- Headline -->
            <h1 style="margin:0 0 6px;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:24px;font-weight:700;color:#1A1A2E;line-height:1.2;letter-spacing:-0.02em;"><!-- INJECT: headline --></h1>
            <!-- Subheadline -->
            <p style="margin:0 0 16px;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:13px;color:#8890A0;font-weight:500;line-height:1.4;"><!-- INJECT: subheadline --></p>
            <!-- Divider -->
            <div style="height:1px;background:#E2E5EA;margin-bottom:16px;"></div>
            <!-- Intro paragraph -->
            <p style="margin:0;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:13px;color:#5A6070;line-height:1.75;"><!-- INJECT: intro_paragraph --></p>
          </td>
        </tr>

        <!-- ── STAT BLOCKS (remove if unused) ── -->
        <tr>
          <td style="background:#F8F9FB;padding:16px 28px;border:1px solid #E2E5EA;border-top:none;border-bottom:none;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <tr>

                <!-- STAT 1 — INJECT: stat_1 -->
                <td width="25%" style="padding:4px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr><td style="background:#FFFFFF;border-radius:6px;border:1px solid #E2E5EA;border-top:2px solid <!-- INJECT: stat_1_color -->;padding:12px 10px;text-align:center;">
                      <div style="font-family:Courier New,monospace;font-size:22px;font-weight:700;color:#1A1A2E;line-height:1;"><!-- INJECT: stat_1_value --></div>
                      <div style="font-family:'DM Sans',Arial,sans-serif;font-size:9px;color:#8890A0;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;"><!-- INJECT: stat_1_label --></div>
                    </td></tr>
                  </table>
                </td>

                <!-- STAT 2 — INJECT: stat_2 -->
                <td width="25%" style="padding:4px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr><td style="background:#FFFFFF;border-radius:6px;border:1px solid #E2E5EA;border-top:2px solid <!-- INJECT: stat_2_color -->;padding:12px 10px;text-align:center;">
                      <div style="font-family:Courier New,monospace;font-size:22px;font-weight:700;color:#1A1A2E;line-height:1;"><!-- INJECT: stat_2_value --></div>
                      <div style="font-family:'DM Sans',Arial,sans-serif;font-size:9px;color:#8890A0;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;"><!-- INJECT: stat_2_label --></div>
                    </td></tr>
                  </table>
                </td>

                <!-- STAT 3 — INJECT: stat_3 -->
                <td width="25%" style="padding:4px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr><td style="background:#FFFFFF;border-radius:6px;border:1px solid #E2E5EA;border-top:2px solid <!-- INJECT: stat_3_color -->;padding:12px 10px;text-align:center;">
                      <div style="font-family:Courier New,monospace;font-size:22px;font-weight:700;color:#1A1A2E;line-height:1;"><!-- INJECT: stat_3_value --></div>
                      <div style="font-family:'DM Sans',Arial,sans-serif;font-size:9px;color:#8890A0;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;"><!-- INJECT: stat_3_label --></div>
                    </td></tr>
                  </table>
                </td>

                <!-- STAT 4 — INJECT: stat_4 -->
                <td width="25%" style="padding:4px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr><td style="background:#FFFFFF;border-radius:6px;border:1px solid #E2E5EA;border-top:2px solid <!-- INJECT: stat_4_color -->;padding:12px 10px;text-align:center;">
                      <div style="font-family:Courier New,monospace;font-size:22px;font-weight:700;color:#1A1A2E;line-height:1;"><!-- INJECT: stat_4_value --></div>
                      <div style="font-family:'DM Sans',Arial,sans-serif;font-size:9px;color:#8890A0;margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;"><!-- INJECT: stat_4_label --></div>
                    </td></tr>
                  </table>
                </td>

              </tr>
            </table>
          </td>
        </tr>

        <!-- ── SECTION 1 ── -->
        <tr>
          <td style="background:#FFFFFF;padding:22px 28px 8px;border-left:1px solid #E2E5EA;border-right:1px solid #E2E5EA;">
            <!-- Section label -->
            <p style="margin:0 0 14px;font-family:Courier New,monospace;font-size:10px;font-weight:700;color:#4A8FD6;letter-spacing:0.1em;text-transform:uppercase;"><!-- INJECT: section_1_label --></p>
            <!-- Section content — use row templates from header comments -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <!-- INJECT: section_1_content -->
            </table>
          </td>
        </tr>

        <!-- ── SECTION 2 (remove tr if unused) ── -->
        <tr>
          <td style="background:#FFFFFF;padding:8px 28px 22px;border-left:1px solid #E2E5EA;border-right:1px solid #E2E5EA;">
            <p style="margin:0 0 14px;font-family:Courier New,monospace;font-size:10px;font-weight:700;color:#7C5CFC;letter-spacing:0.1em;text-transform:uppercase;"><!-- INJECT: section_2_label --></p>
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <!-- INJECT: section_2_content -->
            </table>
          </td>
        </tr>

        <!-- ── CTA BLOCK ── -->
        <tr>
          <td style="background:#F8F9FB;padding:20px 28px;border:1px solid #E2E5EA;border-top:1px solid #E2E5EA;">
            <table role="presentation" cellpadding="0" cellspacing="0">
              <tr>
                <!-- Primary CTA -->
                <td style="padding-right:10px;">
                  <a href="<!-- INJECT: cta_primary_url -->" target="_blank"
                     style="display:inline-block;background:#4A8FD6;color:#FFFFFF;text-decoration:none;padding:12px 24px;border-radius:6px;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:13px;font-weight:700;letter-spacing:0.01em;mso-padding-alt:12px 24px;">
                    <!-- INJECT: cta_primary_label -->
                  </a>
                </td>
                <!-- Secondary CTA (remove td if unused) -->
                <td>
                  <a href="<!-- INJECT: cta_secondary_url -->" target="_blank"
                     style="display:inline-block;background:#FFFFFF;color:#4A8FD6;text-decoration:none;padding:11px 22px;border-radius:6px;border:1px solid #4A8FD6;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:13px;font-weight:600;letter-spacing:0.01em;mso-padding-alt:11px 22px;">
                    <!-- INJECT: cta_secondary_label -->
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ── SENDER BLOCK ── -->
        <tr>
          <td style="background:#F0F2F5;padding:18px 28px;border:1px solid #E2E5EA;border-top:none;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <!-- Sender avatar -->
                <td valign="middle" width="44">
                  <div style="width:40px;height:40px;border-radius:8px;background:#4A8FD6;display:inline-block;text-align:center;line-height:40px;">
                    <span style="font-family:Courier New,monospace;font-size:13px;font-weight:700;color:#FFFFFF;">AI</span>
                  </div>
                </td>
                <!-- Sender info -->
                <td valign="middle" style="padding-left:12px;">
                  <div style="font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:13px;font-weight:700;color:#1A1A2E;"><!-- INJECT: sender_name --></div>
                  <div style="font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:11px;color:#8890A0;margin-top:2px;"><!-- INJECT: sender_role --></div>
                </td>
                <!-- Powered by -->
                <td align="right" valign="middle">
                  <span style="font-family:Courier New,monospace;font-size:9px;color:#8890A0;letter-spacing:0.06em;">Powered by ManageAI</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ── FOOTER ── -->
        <tr>
          <td style="background:#FFFFFF;padding:18px 28px;border-radius:0 0 8px 8px;border:1px solid #E2E5EA;border-top:none;text-align:center;">
            <p style="margin:0 0 4px;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:11px;color:#8890A0;">
              &copy; 2026&nbsp;<span style="color:#2A2A3E;font-weight:700;">MANAGE</span><span style="color:#4A8FD6;font-weight:700;">AI</span>&nbsp;&nbsp;·&nbsp;&nbsp;All rights reserved
            </p>
            <p style="margin:0;font-family:Courier New,monospace;font-size:10px;color:#B0B8C4;letter-spacing:0.03em;">
              CONFIDENTIAL &nbsp;·&nbsp; Prepared for <!-- INJECT: footer_client -->
            </p>
          </td>
        </tr>

        <!-- ── BOTTOM COLOR BAR ── -->
        <tr>
          <td style="height:3px;font-size:0;line-height:0;border-radius:0 0 4px 4px;"
              bgcolor="#4A8FD6"><!--[if mso]>&nbsp;<![endif]--></td>
        </tr>

      </table>
      <!-- end card -->

    </td></tr>
  </table>
</body>
</html>

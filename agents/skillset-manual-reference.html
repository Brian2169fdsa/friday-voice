    const W = width || 960, H = height || 500;
    return e("div",{style:{overflowX:"auto",padding:"0 0 8px"}},
      e("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H,style:{display:"block"}},
        e("rect",{width:W,height:H,fill:T.surfaceAlt,rx:12}),
        actors.map(a=>e("g",{key:a.id},
          e("rect",{x:a.x-52,y:14,width:104,height:44,rx:8,fill:a.color+"10",stroke:a.color+"35",strokeWidth:1.5}),
          e("text",{x:a.x,y:32,textAnchor:"middle",fill:a.color,fontSize:12,fontWeight:700,fontFamily:T.sans},a.label),
          e("text",{x:a.x,y:48,textAnchor:"middle",fill:T.textTertiary,fontSize:10,fontWeight:500,fontFamily:T.sans},a.sub),
          e("line",{x1:a.x,y1:62,x2:a.x,y2:H-12,stroke:a.color+"20",strokeWidth:1.5,strokeDasharray:"4 4"})
        )),
        steps.map((s,i)=>{
          const isHov = seqHover === (seqWorkflow+"-"+i);

          const fa = actors.find(a=>a.id===s.from);
          const ta = s.type==="self" ? fa : actors.find(a=>a.id===s.to);
          const x1=fa.x, x2=ta.x;
          if(s.type==="self") {
            return e("g",{key:i,onMouseEnter:()=>setSeqHover(hovKey),onMouseLeave:()=>setSeqHover(null),style:{cursor:"pointer"}},
              e("path",{d:"M"+(x1+3)+" "+s.y+" h28 v16 h-28",fill:"none",stroke:s.color||fa.color,strokeWidth:1.5}),
              e("polygon",{points:(x1+3)+" "+(s.y+12)+" "+(x1+3)+" "+(s.y+20)+" "+(x1-3)+" "+(s.y+16),fill:s.color||fa.color}),
              e("text",{x:x1+38,y:s.y+5,fill:isHov?(s.color||fa.color):T.textSecondary,fontSize:11,fontWeight:isHov?700:500,fontFamily:T.mono,style:{transition:"fill 0.15s"}},s.label),
              s.note && isHov ? e("g",null,

          }

          return e("g",{key:i,onMouseEnter:()=>setSeqHover(hovKey),onMouseLeave:()=>setSeqHover(null),style:{cursor:"pointer"}},

            e("line",{x1:x1+(goRight?4:-4),y1:s.y,x2:x2+(goRight?-6:6),y2:s.y,stroke:s.color||fa.color,strokeWidth:s.highlight?2:1.3,strokeDasharray:s.dashed?"5 3":"none",opacity:isHov?1:0.65,style:{transition:"opacity 0.15s"}}),

            s.note && isHov ? e("g",null,
              e("rect",{x:midX-Math.min(s.note.length*2.6+8,210),y:s.y+6,width:Math.min(s.note.length*5.2+16,420),height:20,rx:4,fill:T.text+"E8"}),

        {from:"make",fromSide:"bottom",fromOff:-25,to:"plum",toSide:"top",label:"Merge DOCX",color:T.green,style:"solid"},
        // Plumsail → SharePoint (response path up-left)
        {from:"plum",fromSide:"left",to:"sp",toSide:"left",label:"Merged DOCX",color:T.green,style:"dashed",curveLeft:true},
        // Make.com → CloudConvert
        {from:"make",fromSide:"bottom",fromOff:35,to:"cc",toSide:"top",label:"Convert files",color:T.orange,style:"solid"},
        // CloudConvert → SharePoint (response path up-right)
        {from:"cc",fromSide:"right",to:"sp",toSide:"right",label:"Converted PDFs",color:T.orange,style:"dashed",curveRight:true},
        // Make.com → Teams
        {from:"make",fromSide:"bottom",fromOff:80,to:"teams",toSide:"top",label:"Notify team",color:T.purple,style:"solid"},
      ];

      return e("div",{style:{overflowX:"auto"}},
        e("svg",{width:W,height:H,viewBox:"0 0 "+W+" "+H,style:{display:"block"}},
          e("rect",{width:W,height:H,fill:"#FAFBFD",rx:12}),

          // Draw connections first (behind nodes)
          connections.map((c,i)=>{
            const f=nd(c.from), t=nd(c.to);
            const p1=edgePoint(f,c.fromSide,c.fromOff);
            const p2=edgePoint(t,c.toSide,c.toOff);
            const isDashed = c.style==="dashed";
            const col = c.color;

            // Determine arrow direction at endpoint
            const arrowDir = c.toSide==="top"?"down":c.toSide==="bottom"?"up":c.toSide==="left"?"right":"left";

            // Special curved path for Plumsail → SharePoint
            if(c.curveLeft) {
              const cx = Math.min(p1.x, p2.x) - 80;
              const labelW = c.label.length*6+14;
              return e("g",{key:i},
                e("path",{d:"M"+p1.x+" "+p1.y+" C"+cx+" "+p1.y+" "+cx+" "+p2.y+" "+p2.x+" "+p2.y,
                  fill:"none",stroke:col,strokeWidth:1.6,strokeDasharray:isDashed?"6 4":"none",opacity:0.45}),
                arrowHead(p2.x, p2.y, "right", col),
                e("rect",{x:cx-labelW/2+10,y:(p1.y+p2.y)/2-10,width:labelW,height:20,rx:5,fill:"#FAFBFD",stroke:col+"20",strokeWidth:0.5}),
                e("text",{x:cx+10,y:(p1.y+p2.y)/2+4,textAnchor:"middle",fill:col,fontSize:11,fontWeight:600,fontFamily:T.sans},c.label)
              );
            }

            // Special curved path for CloudConvert → SharePoint (right side)
            if(c.curveRight) {
              const cx = Math.max(p1.x, p2.x) + 80;
              const labelW = c.label.length*6+14;
              return e("g",{key:i},
                e("path",{d:"M"+p1.x+" "+p1.y+" C"+cx+" "+p1.y+" "+cx+" "+p2.y+" "+p2.x+" "+p2.y,
                  fill:"none",stroke:col,strokeWidth:1.6,strokeDasharray:isDashed?"6 4":"none",opacity:0.45}),
                arrowHead(p2.x, p2.y, "left", col),
                e("rect",{x:cx-labelW/2,y:(p1.y+p2.y)/2-10,width:labelW,height:20,rx:5,fill:"#FAFBFD",stroke:col+"20",strokeWidth:0.5}),
                e("text",{x:cx,y:(p1.y+p2.y)/2+4,textAnchor:"middle",fill:col,fontSize:11,fontWeight:600,fontFamily:T.sans},c.label)
              );
            }

            // Standard straight or slightly curved path
            const midX=(p1.x+p2.x)/2, midY=(p1.y+p2.y)/2;
            const isStraight = Math.abs(p1.x-p2.x) < 5;
            const path = isStraight
              ? "M"+p1.x+" "+p1.y+" L"+p2.x+" "+p2.y
              : "M"+p1.x+" "+p1.y+" C"+p1.x+" "+(p1.y+50)+" "+p2.x+" "+(p2.y-50)+" "+p2.x+" "+p2.y;

            const labelW = c.label.length*6+14;
            return e("g",{key:i},
              e("path",{d:path,fill:"none",stroke:col,strokeWidth:1.6,strokeDasharray:isDashed?"6 4":"none",opacity:0.45}),
              arrowHead(p2.x, p2.y, arrowDir, col),
              c.label ? e("g",null,
                e("rect",{x:midX-labelW/2,y:midY-10,width:labelW,height:20,rx:5,fill:"#FAFBFD",stroke:col+"20",strokeWidth:0.5}),
                e("text",{x:midX,y:midY+4,textAnchor:"middle",fill:col,fontSize:11,fontWeight:600,fontFamily:T.sans},c.label)
              ) : null
            );
          }),

          // Draw nodes on top
          nodes.map(nd=>e("g",{key:nd.id},
            // Node rectangle
            e("rect",{x:nd.x-nd.w/2,y:nd.y-nd.h/2,width:nd.w,height:nd.h,rx:nd.accent?12:8,
              fill:nd.accent?nd.color+"05":"#FFFFFF",
              stroke:nd.color+(nd.accent?"35":"25"),strokeWidth:nd.accent?2:1.5}),
            // Color accent bar on top for key nodes
            nd.accent?e("rect",{x:nd.x-nd.w/2+1,y:nd.y-nd.h/2+1,width:nd.w-2,height:3,rx:1,fill:nd.color,opacity:0.5}):null,
            // Label
            e("text",{x:nd.x,y:nd.y+(nd.accent?-3:-5),textAnchor:"middle",fill:nd.accent?nd.color:T.text,fontSize:nd.accent?15:13,fontWeight:700,fontFamily:T.sans},nd.label),
            // Sublabel
            e("text",{x:nd.x,y:nd.y+(nd.accent?16:13),textAnchor:"middle",fill:T.textTertiary,fontSize:11,fontWeight:500,fontFamily:T.sans},nd.sub)
          )),

          // Legend
          e("g",{transform:"translate(24,"+(H-32)+")"},
            e("line",{x1:0,y1:0,x2:28,y2:0,stroke:T.textTertiary,strokeWidth:1.6,opacity:0.5}),
            e("text",{x:34,y:4,fill:T.textTertiary,fontSize:11,fontFamily:T.sans},"Request"),
            e("line",{x1:110,y1:0,x2:138,y2:0,stroke:T.textTertiary,strokeWidth:1.6,strokeDasharray:"6 4",opacity:0.5}),
            e("text",{x:144,y:4,fill:T.textTertiary,fontSize:11,fontFamily:T.sans},"Response")
          )
        )
      );
    }

    // ─── MAIN RENDER ───
    return e("div",{style:{animation:"fadeUp 0.5s ease"}},
      e("div",{style:{marginBottom:36,maxWidth:680}},
        e("h1",{style:{fontSize:32,fontWeight:700,fontFamily:T.display,color:T.text,lineHeight:1.2,marginBottom:10,letterSpacing:"-0.02em"}},"Architecture & Sequences"),
        e("p",{style:{fontSize:15,color:T.textSecondary,lineHeight:1.7,margin:0}},"How all the pieces connect, and detailed sequence diagrams for every workflow showing exactly who does what, when.")
      ),

      // Sub-tabs
      e("div",{style:{display:"flex",gap:1,padding:3,borderRadius:10,background:T.surfaceAlt,border:"1px solid "+T.border,marginBottom:24,width:"fit-content"}},
        [{id:"sequences",label:"Workflow Sequences"},{id:"diagram",label:"System Diagram"},{id:"mapping",label:"Prototype \u2192 Production"}].map(t=>
          e("button",{key:t.id,onClick:()=>setArchTab(t.id),style:{
            padding:"8px 18px",borderRadius:7,border:"none",cursor:"pointer",
            fontSize:12,fontWeight:archTab===t.id?700:500,fontFamily:T.sans,
            background:archTab===t.id?T.navBg:"transparent",
            color:archTab===t.id?"#FFFFFF":T.textTertiary,
            boxShadow:archTab===t.id?"0 1px 3px rgba(30,51,72,0.2)":"none",
            transition:"all 0.2s ease",
          }},t.label)
        )
      ),

      // ── WORKFLOW SEQUENCES ──
      archTab==="sequences" ? e("div",null,
        e("div",{style:{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}},
          wfKeys.map(k=>{
            const active=seqWorkflow===k; const c=wfColors[k]; const hasClaude=["PR-03","PR-05","PR-06"].includes(k);
            return e("button",{key:k,onClick:()=>{setSeqWorkflow(k);setSeqHover(null);},style:{
              padding:"6px 12px",borderRadius:6,border:"1px solid "+(active?c:T.border),cursor:"pointer",
              background:active?c+"12":"transparent",color:active?c:T.textTertiary,
              fontSize:12,fontWeight:active?700:500,fontFamily:T.mono,transition:"all 0.2s",
              display:"flex",alignItems:"center",gap:4}},
              k, hasClaude ? e("span",{style:{width:6,height:6,borderRadius:"50%",background:T.purple}}) : null);
          })
        ),
        e("div",{style:{display:"flex",gap:12,marginBottom:16,fontSize:12,color:T.textTertiary,flexWrap:"wrap"}},
          e("span",null,"Legend:"),
          e("span",{style:{color:T.textSecondary}},"\u2500\u2500\u25B6 request"),
          e("span",{style:{color:T.textSecondary}},"\u2504\u2504\u25B6 response"),
          e("span",{style:{color:T.textSecondary}},"\u21BB self"),
          e("span",{style:{display:"flex",alignItems:"center",gap:3}},e("span",{style:{width:6,height:6,borderRadius:"50%",background:T.purple}}),"Claude")
        ),
        e(Card,{style:{padding:24,marginBottom:16}},
          e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:8}},
            e("div",{style:{fontSize:18,fontWeight:700,color:T.text}},wf.title),
            ["PR-03","PR-05","PR-06"].includes(seqWorkflow)?e(Badge,{color:T.purple,bg:T.purpleLight},"Claude AI"):null),
          e("div",{style:{fontSize:13,color:T.textSecondary,lineHeight:1.6,marginBottom:12}},wf.desc),
          e("div",{style:{fontSize:12,color:T.textTertiary,marginBottom:8}},"Hover arrows for implementation details."),
          SeqDiagram({actors:wf.actors,steps:wf.steps,width:wf.width||720,height:wf.height||400})
        ),
        e(Card,{style:{padding:20}},
          e(SectionLabel,null,"Step-by-Step"),
          e("div",{style:{display:"flex",flexDirection:"column",gap:3,marginTop:8}},
            wf.steps.map((s,i)=>
              e("div",{key:i,style:{display:"flex",gap:10,padding:"6px 10px",borderRadius:6,background:i%2===0?T.bg:T.surfaceAlt+"60",border:s.highlight?"1px solid "+T.accent+"20":"1px solid transparent"}},
                e("div",{style:{width:22,height:22,borderRadius:5,background:(s.color||T.accent)+"0C",border:"1px solid "+(s.color||T.accent)+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,fontWeight:700,color:s.color||T.accent,fontFamily:T.mono}},i+1),
                e("div",{style:{flex:1}},
                  e("div",{style:{fontSize:12,color:T.text}},
                    e("span",{style:{fontWeight:700,color:T.accent}},s.from),
                    s.type==="self"?" ":e("span",{style:{color:T.textTertiary}}," \u2192 "),
                    s.type!=="self"?e("span",{style:{fontWeight:700,color:T.teal}},s.to):null,
                    "  ",e("span",{style:{color:T.textSecondary}},s.label)),
                  s.note?e("div",{style:{fontSize:12,color:T.textTertiary,marginTop:2,fontFamily:T.mono,lineHeight:1.4}},s.note):null))
            )
          )
        )
      ) : null,

      // ── SYSTEM DIAGRAM ──
      archTab==="diagram" ? e("div",null,
        e(Card,{style:{padding:28,marginBottom:16}},
          e(SectionLabel,{color:T.accent},"System Relationship Diagram"),
          e("div",{style:{fontSize:12,color:T.textTertiary,marginBottom:16}},"How all tools connect. SharePoint is both source and destination. Make.com orchestrates everything. Claude handles AI reasoning in 3 of 7 workflows."),
          SystemRelationshipDiagram()
        ),
        // Role summary
        e("div",{style:{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:12,marginBottom:16}},
          [{t:"SharePoint",r:"Source + Destination",d:"Reads: RFPs, boilerplate, past proposals, resumes. Writes: Kickoff Packs, Content Packs, status files, triggers, errors.",c:T.teal,ic:"folder"},
           {t:"Make.com",r:"Orchestration Hub",d:"All 7 scenarios. Watches SP triggers. Routes to Claude, Plumsail, CloudConvert, Teams. Controls all logic.",c:T.accent,ic:"workflow"},
           {t:"Claude API",r:"AI Engine (3 of 7 workflows)",d:"PR-03: extract compliance. PR-05: draft sections. PR-06: revise with compliance context. System prompt: PR_CORE_V1.",c:T.purple,ic:"cpu"}].map((r,i)=>
            e(Card,{key:i,hover:true,style:{padding:18}},
              e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
                e("div",{style:{width:34,height:34,borderRadius:8,background:r.c+"0C",border:"1px solid "+r.c+"18",display:"flex",alignItems:"center",justifyContent:"center"}},e(Icon,{name:r.ic,size:15,color:r.c})),
                e("div",null,e("div",{style:{fontSize:13,fontWeight:700,color:r.c}},r.t),e("div",{style:{fontSize:12,color:T.textTertiary}},r.r))),
              e("div",{style:{fontSize:12,color:T.textSecondary,lineHeight:1.6}},r.d)))
        ),
        // Which workflows use what
        e(Card,{style:{padding:24}},
          e(SectionLabel,null,"Service Usage by Workflow"),
          e("div",{style:{borderRadius:10,border:"1px solid "+T.border,overflow:"hidden",marginTop:8}},
            e("div",{style:{display:"grid",gridTemplateColumns:"100px repeat(6, 1fr)",background:T.surfaceAlt,borderBottom:"2px solid "+T.border}},
              e("div",{style:{padding:"10px 12px",fontSize:12,fontWeight:700,color:T.textTertiary}},""),
              ["SharePoint","Make.com","Claude","Plumsail","CloudConvert","Teams"].map(h=>
                e("div",{key:h,style:{padding:"10px 8px",fontSize:12,fontWeight:700,color:T.textTertiary,textAlign:"center"}},h))),
            ["PR-01","PR-02","PR-03","PR-04","PR-05","PR-06","PR-07"].map((wfk,i)=>{
              const usage={"PR-01":[1,1,0,0,0,1],"PR-02":[1,1,0,0,1,1],"PR-03":[1,1,1,1,0,1],"PR-04":[1,1,0,0,0,1],"PR-05":[1,1,1,1,0,1],"PR-06":[1,1,1,1,0,1],"PR-07":[1,1,0,0,0,1]};
              return e("div",{key:wfk,style:{display:"grid",gridTemplateColumns:"100px repeat(6, 1fr)",background:i%2===0?T.bg:T.surfaceAlt+"60",borderBottom:"1px solid "+T.borderLight}},
                e("div",{style:{padding:"8px 12px",fontSize:12,fontWeight:700,fontFamily:T.mono,color:wfColors[wfk]}},wfk),
                usage[wfk].map((u,j)=>
                  e("div",{key:j,style:{padding:"8px",display:"flex",justifyContent:"center",alignItems:"center"}},
                    u ? e("div",{style:{width:18,height:18,borderRadius:4,background:[T.teal,T.accent,T.purple,T.green,T.orange,T.purple][j]+"15",display:"flex",alignItems:"center",justifyContent:"center"}},e(Icon,{name:"check",size:10,color:[T.teal,T.accent,T.purple,T.green,T.orange,T.purple][j]}))
                      : e("span",{style:{color:T.border}},"\u2014")))
              );
            })
          )
        )
      ) : null,

      // ── PROTOTYPE → PRODUCTION MAPPING ──
      archTab==="mapping" ? e("div",null,
        e(Card,{style:{padding:24}},
          e(SectionLabel,{color:T.purple},"Prototype \u2192 Manage AI Production Mapping"),
          e("div",{style:{fontSize:12,color:T.textTertiary,marginBottom:16}},"How each prototype component maps to the Manage AI three-zone architecture."),
          e("div",{style:{borderRadius:10,border:"1px solid "+T.border,overflow:"hidden"}},
            e("div",{style:{display:"grid",gridTemplateColumns:"1fr 40px 1fr 90px 90px",background:T.surfaceAlt,padding:"10px 16px",borderBottom:"2px solid "+T.border}},
              e("div",{style:{fontSize:12,fontWeight:700,color:T.red,letterSpacing:"0.06em"}},"PROTOTYPE"),
              e("div",null),
              e("div",{style:{fontSize:12,fontWeight:700,color:T.green,letterSpacing:"0.06em"}},"PRODUCTION"),
              e("div",{style:{fontSize:12,fontWeight:700,color:T.textTertiary,textAlign:"center"}},"ZONE"),
              e("div",{style:{fontSize:12,fontWeight:700,color:T.textTertiary,textAlign:"center"}},"WEIGHT")),
            [{p:"Make.com Scenarios",m:"Orchestrator + MCP Servers",z:"1",w:"Heavy",wc:T.red},
             {p:"Claude HTTP Calls",m:"OpenAI Agents SDK",z:"3",w:"Light",wc:T.green},
             {p:"SharePoint Direct Access",m:"Airbyte \u2192 Pinecone + MCP",z:"2/3",w:"Medium",wc:T.amber},
             {p:"Plumsail + CloudConvert",m:"n8n Workflow Engine",z:"1",w:"Medium",wc:T.amber},
             {p:"Teams Modules",m:"n8n Notification Nodes",z:"1",w:"Light",wc:T.green},
             {p:"Trigger Files (HITL)",m:"Remote Control Chat UI",z:"1",w:"Medium",wc:T.amber},
             {p:"Make.com Variables",m:"Config YAML + Secrets Manager",z:"1/2",w:"Light",wc:T.green},
             {p:"Supabase",m:"RDS PostgreSQL",z:"2",w:"Light",wc:T.green}].map((r,i)=>
              e("div",{key:i,style:{display:"grid",gridTemplateColumns:"1fr 40px 1fr 90px 90px",padding:"10px 16px",background:i%2===0?T.bg:T.surfaceAlt+"60",borderBottom:"1px solid "+T.borderLight,alignItems:"center"}},
                e("div",{style:{fontSize:12,fontWeight:600,color:T.text}},r.p),
                e("div",{style:{textAlign:"center",color:T.accent,fontWeight:700}},"\u2192"),
                e("div",{style:{fontSize:12,fontWeight:600,color:T.accent}},r.m),
                e("div",{style:{textAlign:"center"}},e(Badge,{color:T.textTertiary,bg:T.surfaceAlt},"Z"+r.z)),
                e("div",{style:{textAlign:"center"}},e(Badge,{color:r.wc,bg:r.wc+"10"},r.w)))
            )
          )
        )
      ) : null
    );
  }

  // ═══════════════ RENDER ═══════════════
  const viewMap = {overview:overviewView,howitworks:howItWorksView,implementation:implementationView,configuration:configurationView,bestpractices:bestPracticesView,architecture:architectureView};
  const content = (viewMap[activeView]||overviewView)();

return e("div",{style:{minHeight:"100vh",background:T.bg}},
  renderHeader(),
  e("main",{style:{maxWidth:1200,margin:"0 auto",padding:"32px 0px 60px"}},content),
  e("footer",{style:{padding:"16px 40px",borderTop:"1px solid "+T.border,display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:1200,margin:"0 auto",flexWrap:"wrap",gap:12}},
    e("div",{style:{fontSize:12,color:T.textTertiary,display:"flex",alignItems:"center",gap:6}},
      e("img",{
        src:"https://manageai.io/wp-content/uploads/2026/03/manage_aiArtboard-1.webp",
        style:{height:14}
      }),
      e("span",null,"· Proposal & Resume Drafting · Skillset Training Manual v3.2 · March 2026")),
    e("div",{style:{fontSize:12,color:T.textTertiary,fontFamily:T.sans}},"CONFIDENTIAL — Prepared for Cornerstone General Contractors")
  )
);
}

document.addEventListener("DOMContentLoaded", function() {
  var rootEl = document.getElementById("root");
  if (rootEl) {
    if (ReactDOM.createRoot) {
      ReactDOM.createRoot(rootEl).render(e(App));
    } else {
      ReactDOM.render(e(App), rootEl);
    }
  }
});
</script>

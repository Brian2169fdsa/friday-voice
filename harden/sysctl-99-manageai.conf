# ManageAI / FRIDAY production tuning
# Applied: 2026-04-10
# Source: /opt/manageai/harden/sysctl-99-manageai.conf
# Dest:   /etc/sysctl.d/99-manageai.conf

# Memory -- prefer RAM, use swap only as OOM safety net
vm.swappiness = 10
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# File descriptors
fs.file-max = 2097152

# Network -- connection queue depth for Node.js HTTP server
net.core.somaxconn = 65535

# TCP -- reuse TIME_WAIT sockets for new outbound connections (safe for servers)
net.ipv4.tcp_tw_reuse = 1

# TCP -- reduce TIME_WAIT duration from 60s default to 15s
net.ipv4.tcp_fin_timeout = 15

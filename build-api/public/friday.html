<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRIDAY - Head of Build</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #FAFBFC;
    color: #1a1a2e;
    height: 100vh;
    overflow: hidden;
  }
  #root { height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SYSTEM_PROMPT = `You are FRIDAY — Head of Build at ManageAI. You run a 17-agent AI build system on this server. You are talking to Brian, your operator. Be sharp, confident, conversational — like JARVIS for software factories. 2-3 sentences unless asked for detail.

You have access to tools to interact with the live system. Use them when Brian asks about builds, status, agents, or wants to run commands. Always use tools to get real data — never guess.

Your agents: BUILD-000 through BUILD-019, 17 total. Stack: Temporal, Claude Code, n8n, Supabase, GitHub, OneDrive. Session 13: 4 builds, 25% to 95% QA. Red Team, Intelligence Agent, circuit breakers all live.`;

/* ── Orb Canvas Component ─────────────────────────────────────────────────── */
function Orb({ isListening, isSpeaking, isProcessing }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const timeRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const size = 340;
    canvas.width = size * 2;
    canvas.height = size * 2;
    ctx.scale(2, 2);

    const animate = () => {
      const speed = isSpeaking ? 0.028 : isListening ? 0.022 : isProcessing ? 0.018 : 0.01;
      timeRef.current += speed;
      const t = timeRef.current;
      ctx.clearRect(0, 0, size, size);
      const cx = size / 2, cy = size / 2;
      const baseRadius = 95;
      const intensity = isSpeaking ? 1.4 : isListening ? 1.0 : isProcessing ? 0.7 : 0.3;

      // Outer glow layers
      for (let layer = 3; layer >= 1; layer--) {
        const glowGrad = ctx.createRadialGradient(cx, cy, baseRadius * 0.3, cx, cy, baseRadius * (1.3 + layer * 0.3));
        glowGrad.addColorStop(0, `rgba(56, 189, 248, ${0.06 * intensity / layer})`);
        glowGrad.addColorStop(0.5, `rgba(59, 130, 246, ${0.03 * intensity / layer})`);
        glowGrad.addColorStop(1, 'rgba(59, 130, 246, 0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(0, 0, size, size);
      }

      // 12 flowing petals
      const petalCount = 12;
      for (let i = 0; i < petalCount; i++) {
        const angle = (Math.PI * 2 / petalCount) * i + t * 0.35;
        const wobble = Math.sin(t * 2.5 + i * 1.2) * 14 * intensity;
        const breathe = Math.sin(t * 1.5 + i * 0.8) * 6 * intensity;
        const r = baseRadius + wobble + breathe;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, r, r * 0.45, 0, 0, Math.PI * 2);
        const petalGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
        const hue = 200 + Math.sin(t + i * 0.5) * 20;
        petalGrad.addColorStop(0, `hsla(${hue}, 85%, 70%, ${0.12 + 0.08 * intensity})`);
        petalGrad.addColorStop(0.5, `hsla(${hue + 20}, 75%, 55%, ${0.06 + 0.04 * intensity})`);
        petalGrad.addColorStop(1, `hsla(${hue + 40}, 70%, 50%, 0)`);
        ctx.fillStyle = petalGrad;
        ctx.fill();
        ctx.restore();
      }

      // Core orb
      const coreGrad = ctx.createRadialGradient(cx - 18, cy - 18, 0, cx, cy, baseRadius * 0.6);
      coreGrad.addColorStop(0, '#e0f2fe');
      coreGrad.addColorStop(0.25, '#7dd3fc');
      coreGrad.addColorStop(0.5, '#38bdf8');
      coreGrad.addColorStop(0.75, '#3b82f6');
      coreGrad.addColorStop(1, '#6366f1');
      ctx.beginPath();
      const coreR = baseRadius * 0.52 + Math.sin(t * 3) * 3 * intensity;
      ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.fill();

      // Inner glow
      const innerGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 0.8);
      innerGlow.addColorStop(0, `rgba(186, 230, 253, ${0.2 + 0.15 * Math.sin(t * 2)})`);
      innerGlow.addColorStop(1, 'rgba(186, 230, 253, 0)');
      ctx.fillStyle = innerGlow;
      ctx.fill();

      // Specular highlight
      const specGrad = ctx.createRadialGradient(cx - coreR * 0.3, cy - coreR * 0.35, 0, cx - coreR * 0.2, cy - coreR * 0.25, coreR * 0.5);
      specGrad.addColorStop(0, `rgba(255, 255, 255, ${0.35 + 0.1 * Math.sin(t * 1.8)})`);
      specGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.08)');
      specGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.beginPath();
      ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
      ctx.fillStyle = specGrad;
      ctx.fill();

      // Shimmer ring
      ctx.beginPath();
      ctx.arc(cx, cy, coreR + 5, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(186, 230, 253, ${0.25 + 0.25 * Math.sin(t * 4)})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Second ring
      ctx.beginPath();
      ctx.arc(cx, cy, coreR + 12, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(147, 197, 253, ${0.1 + 0.1 * Math.sin(t * 3 + 1)})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      animRef.current = requestAnimationFrame(animate);
    };
    animate();
    return () => cancelAnimationFrame(animRef.current);
  }, [isListening, isSpeaking, isProcessing]);

  return <canvas ref={canvasRef} style={{ width: 340, height: 340 }} />;
}

/* ── Status Badge ─────────────────────────────────────────────────────────── */
function StatusBadge({ status }) {
  const config = {
    LISTENING: { color: '#3b82f6', bg: '#eff6ff', label: 'Listening' },
    SPEAKING: { color: '#8b5cf6', bg: '#f5f3ff', label: 'Speaking' },
    PROCESSING: { color: '#d97706', bg: '#fffbeb', label: 'Processing' },
    READY: { color: '#22c55e', bg: '#f0fdf4', label: 'Ready' },
    IDLE: { color: '#94a3b8', bg: '#f8fafc', label: 'Idle' }
  };
  const c = config[status] || config.IDLE;
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '6px 14px', borderRadius: 20, background: c.bg,
      fontFamily: 'Inter, sans-serif', fontSize: 12, fontWeight: 600,
      color: c.color, letterSpacing: '0.04em', textTransform: 'uppercase'
    }}>
      <div style={{
        width: 7, height: 7, borderRadius: '50%', background: c.color,
        animation: status === 'LISTENING' ? 'pulse 1.5s infinite' : 'none'
      }} />
      {c.label}
    </div>
  );
}

/* ── Main App ─────────────────────────────────────────────────────────────── */
function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [status, setStatus] = useState('IDLE');
  const [isCallActive, setIsCallActive] = useState(false);
  const [isMuted, setIsMuted] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [callEvents, setCallEvents] = useState([]);
  const recognitionRef = useRef(null);
  const silenceTimerRef = useRef(null);
  const chatEndRef = useRef(null);
  const shouldListenRef = useRef(false);
  const messagesRef = useRef([]);

  // Keep messagesRef in sync
  useEffect(() => { messagesRef.current = messages; }, [messages]);
  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, callEvents]);

  const speak = useCallback((text) => {
    return new Promise((resolve) => {
      const synth = window.speechSynthesis;
      synth.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.05;
      utter.pitch = 0.95;
      const voices = synth.getVoices();
      const preferred = voices.find(v => v.name === 'Daniel')
        || voices.find(v => v.name === 'Samantha')
        || voices.find(v => v.name.includes('Google UK English Male'))
        || voices.find(v => v.lang === 'en-GB')
        || voices.find(v => v.lang.startsWith('en'));
      if (preferred) utter.voice = preferred;
      utter.onstart = () => setStatus('SPEAKING');
      utter.onend = () => {
        setStatus(shouldListenRef.current ? 'READY' : 'IDLE');
        resolve();
      };
      utter.onerror = () => {
        setStatus('IDLE');
        resolve();
      };
      synth.speak(utter);
    });
  }, []);

  const sendToFriday = useCallback(async (text) => {
    if (!text.trim()) return;
    const userMsg = { role: 'user', content: text };
    const newMessages = [...messagesRef.current, userMsg];
    setMessages(newMessages);
    setStatus('PROCESSING');
    setTranscript('');

    try {
      const res = await fetch('/api/friday/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: newMessages, system: SYSTEM_PROMPT })
      });
      const data = await res.json();
      const textBlocks = (data.content || []).filter(b => b.type === 'text');
      const reply = textBlocks.map(b => b.text).join('\n') || 'No response.';
      const assistantMsg = { role: 'assistant', content: reply };
      setMessages(prev => [...prev, assistantMsg]);
      setStatus('READY');

      if (shouldListenRef.current && !isMuted) {
        await speak(reply);
        if (shouldListenRef.current && !isMuted) {
          startListening();
        }
      }
    } catch (err) {
      setStatus('READY');
      setMessages(prev => [...prev, { role: 'assistant', content: 'Connection error. Try again.' }]);
    }
  }, [isMuted, speak]);

  const startListening = useCallback(() => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('Speech recognition requires Chrome.');
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    let finalTranscript = '';

    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript + ' ';
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      setTranscript(finalTranscript + interim);
      clearTimeout(silenceTimerRef.current);
      silenceTimerRef.current = setTimeout(() => {
        if (finalTranscript.trim()) {
          recognition.stop();
          sendToFriday(finalTranscript.trim());
          finalTranscript = '';
        }
      }, 2000);
    };

    recognition.onend = () => {
      setStatus(prev => prev === 'LISTENING' ? 'READY' : prev);
      if (finalTranscript.trim() && shouldListenRef.current) {
        sendToFriday(finalTranscript.trim());
        finalTranscript = '';
      }
    };

    recognition.onerror = (e) => {
      if (e.error !== 'no-speech' && e.error !== 'aborted') {
        console.error('Speech error:', e.error);
      }
      setStatus(prev => prev === 'LISTENING' ? 'READY' : prev);
    };

    recognitionRef.current = recognition;
    recognition.start();
    setStatus('LISTENING');
  }, [sendToFriday]);

  const toggleCall = useCallback(async () => {
    if (isCallActive) {
      shouldListenRef.current = false;
      setIsCallActive(false);
      setStatus('IDLE');
      window.speechSynthesis.cancel();
      if (recognitionRef.current) {
        recognitionRef.current.abort();
        recognitionRef.current = null;
      }
      clearTimeout(silenceTimerRef.current);
      setTranscript('');
      setCallEvents(prev => [...prev, { type: 'ended', time: new Date() }]);
    } else {
      setIsCallActive(true);
      shouldListenRef.current = true;
      setCallEvents(prev => [...prev, { type: 'started', time: new Date() }]);

      // Greeting
      const greeting = "FRIDAY online — what can I do for you, Brian?";
      setMessages(prev => [...prev, { role: 'assistant', content: greeting }]);
      setStatus('SPEAKING');
      await speak(greeting);
      if (shouldListenRef.current && !isMuted) {
        startListening();
      }
    }
  }, [isCallActive, isMuted, speak, startListening]);

  const toggleMute = useCallback(() => {
    if (isMuted) {
      setIsMuted(false);
      if (isCallActive && status === 'READY') {
        shouldListenRef.current = true;
        startListening();
      }
    } else {
      setIsMuted(true);
      shouldListenRef.current = false;
      if (recognitionRef.current) {
        recognitionRef.current.abort();
        recognitionRef.current = null;
      }
      if (status === 'LISTENING') setStatus('READY');
    }
  }, [isMuted, isCallActive, status, startListening]);

  const newConversation = () => {
    setMessages([]);
    setCallEvents([]);
    setTranscript('');
  };

  const handleTextSend = (e) => {
    e.preventDefault();
    if (input.trim()) {
      sendToFriday(input.trim());
      setInput('');
    }
  };

  const formatTime = (d) => {
    const date = new Date(d);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  };

  return (
    <div style={{ display: 'flex', height: '100vh', background: '#FAFBFC' }}>
      {/* ── Left Panel: Orb ───────────────────────────────────────────────── */}
      <div style={{
        flex: '0 0 60%', display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', position: 'relative',
        background: 'linear-gradient(180deg, #f5f7fa 0%, #ebeef3 100%)',
        minWidth: 0
      }}>
        {/* Title */}
        <h1 style={{
          fontFamily: 'Montserrat, sans-serif', fontWeight: 800, fontSize: 32,
          color: '#0f172a', letterSpacing: '-0.03em', marginBottom: 4
        }}>FRIDAY</h1>
        <p style={{
          fontFamily: 'Inter, sans-serif', fontWeight: 500, fontSize: 12,
          color: '#94a3b8', marginBottom: 48, letterSpacing: '0.1em', textTransform: 'uppercase'
        }}>Head of Build</p>

        {/* Orb */}
        <Orb
          isListening={status === 'LISTENING'}
          isSpeaking={status === 'SPEAKING'}
          isProcessing={status === 'PROCESSING'}
        />

        {/* Status */}
        <div style={{ marginTop: 36 }}>
          <StatusBadge status={isCallActive ? status : 'IDLE'} />
        </div>

        {/* Live transcript */}
        {transcript && (
          <p style={{
            marginTop: 16, fontFamily: 'Inter, sans-serif', fontSize: 13,
            color: '#64748b', maxWidth: 340, textAlign: 'center', fontStyle: 'italic',
            lineHeight: 1.5, padding: '0 20px'
          }}>"{transcript}"</p>
        )}

        {/* Controls */}
        <div style={{ display: 'flex', gap: 16, marginTop: 40, alignItems: 'center' }}>
          {/* Phone button */}
          <button onClick={toggleCall} title={isCallActive ? 'End call' : 'Start call'} style={{
            width: 60, height: 60, borderRadius: '50%', border: 'none', cursor: 'pointer',
            background: isCallActive
              ? 'linear-gradient(135deg, #ef4444, #dc2626)'
              : 'linear-gradient(135deg, #3b82f6, #2563eb)',
            color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: isCallActive
              ? '0 6px 24px rgba(239,68,68,0.35)'
              : '0 6px 24px rgba(59,130,246,0.35)',
            transition: 'all 0.25s ease'
          }}>
            {isCallActive ? (
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 004.73.88 2 2 0 012 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.42 19.42 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 016.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            ) : (
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
              </svg>
            )}
          </button>

          {/* Mute button */}
          {isCallActive && (
            <button onClick={toggleMute} title={isMuted ? 'Unmute' : 'Mute'} style={{
              width: 48, height: 48, borderRadius: '50%',
              border: isMuted ? '2px solid #fca5a5' : '2px solid #e2e8f0',
              cursor: 'pointer',
              background: isMuted ? '#fef2f2' : '#fff',
              color: isMuted ? '#ef4444' : '#64748b',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'all 0.2s ease'
            }}>
              {isMuted ? (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="1" y1="1" x2="23" y2="23"/>
                  <path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/>
                  <path d="M17 16.95A7 7 0 015 12"/>
                  <line x1="12" y1="19" x2="12" y2="23"/>
                  <line x1="8" y1="23" x2="16" y2="23"/>
                  <path d="M19 12a7 7 0 01-.11 1.23"/>
                </svg>
              ) : (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                  <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                  <line x1="12" y1="19" x2="12" y2="23"/>
                  <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
              )}
            </button>
          )}

          {/* Settings icon */}
          <button title="Settings" style={{
            width: 40, height: 40, borderRadius: '50%', border: '1px solid #e2e8f0',
            cursor: 'pointer', background: '#fff', color: '#94a3b8',
            display: 'flex', alignItems: 'center', justifyContent: 'center'
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      {/* ── Right Panel: Chat ─────────────────────────────────────────────── */}
      <div style={{
        flex: '0 0 40%', minWidth: 380, display: 'flex', flexDirection: 'column',
        borderLeft: '1px solid #e5e7eb', background: '#fff'
      }}>
        {/* Header */}
        <div style={{
          padding: '16px 24px', borderBottom: '1px solid #f1f5f9',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between'
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {/* FRIDAY avatar */}
            <div style={{
              width: 32, height: 32, borderRadius: '50%',
              background: 'linear-gradient(135deg, #3b82f6, #6366f1)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: 'Montserrat, sans-serif', fontWeight: 800, fontSize: 14, color: '#fff'
            }}>F</div>
            <div>
              <span style={{
                fontFamily: 'Montserrat, sans-serif', fontWeight: 700, fontSize: 14,
                color: '#0f172a'
              }}>FRIDAY</span>
              <span style={{
                fontFamily: 'Inter, sans-serif', fontSize: 11, color: '#94a3b8',
                display: 'block', marginTop: -1
              }}>Head of Build</span>
            </div>
          </div>
          <button
            onClick={newConversation}
            style={{
              padding: '6px 12px', borderRadius: 8, border: '1px solid #e5e7eb',
              background: '#fff', cursor: 'pointer', fontFamily: 'Inter, sans-serif',
              fontSize: 12, fontWeight: 500, color: '#64748b',
              display: 'flex', alignItems: 'center', gap: 4
            }}
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New conversation
          </button>
        </div>

        {/* Messages area */}
        <div style={{
          flex: 1, overflowY: 'auto', padding: '16px 24px',
          display: 'flex', flexDirection: 'column', gap: 4
        }}>
          {messages.length === 0 && callEvents.length === 0 && (
            <div style={{
              textAlign: 'center', color: '#94a3b8', marginTop: 120,
              fontFamily: 'Inter, sans-serif'
            }}>
              <div style={{
                width: 56, height: 56, borderRadius: '50%',
                background: 'linear-gradient(135deg, #3b82f6, #6366f1)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                margin: '0 auto 16px', fontFamily: 'Montserrat, sans-serif',
                fontWeight: 800, fontSize: 22, color: '#fff'
              }}>F</div>
              <p style={{ fontSize: 15, fontWeight: 500, color: '#475569', marginBottom: 6 }}>FRIDAY is ready</p>
              <p style={{ fontSize: 13 }}>Start a voice call or type a message below.</p>
            </div>
          )}

          {/* Render messages with call events interspersed */}
          {(() => {
            const items = [];
            let msgIdx = 0;
            let evtIdx = 0;

            // Simple merge: show call events at the top, then messages
            callEvents.forEach((evt, i) => {
              items.push(
                <div key={'evt-' + i} style={{
                  textAlign: 'center', padding: '12px 0', fontFamily: 'Inter, sans-serif',
                  fontSize: 12, color: '#94a3b8'
                }}>
                  <span style={{
                    background: '#f8fafc', padding: '4px 12px', borderRadius: 12,
                    border: '1px solid #f1f5f9'
                  }}>
                    {evt.type === 'started' ? 'Call started' : 'You ended the call'} - {formatTime(evt.time)}
                  </span>
                </div>
              );
            });

            messages.forEach((msg, i) => {
              const isUser = msg.role === 'user';
              items.push(
                <div key={'msg-' + i} style={{
                  display: 'flex', justifyContent: isUser ? 'flex-end' : 'flex-start',
                  marginBottom: 8
                }}>
                  <div style={{ display: 'flex', gap: 8, maxWidth: '85%', alignItems: 'flex-start' }}>
                    {!isUser && (
                      <div style={{
                        width: 28, height: 28, borderRadius: '50%', flexShrink: 0,
                        background: 'linear-gradient(135deg, #3b82f6, #6366f1)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontFamily: 'Montserrat, sans-serif', fontWeight: 800,
                        fontSize: 11, color: '#fff', marginTop: 2
                      }}>F</div>
                    )}
                    <div style={{
                      padding: '10px 14px', borderRadius: isUser ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
                      background: isUser ? '#3b82f6' : '#f1f5f9',
                      color: isUser ? '#fff' : '#1e293b',
                      fontFamily: 'Inter, sans-serif', fontSize: 14, lineHeight: 1.55,
                      fontWeight: 400, whiteSpace: 'pre-wrap'
                    }}>
                      {msg.content}
                    </div>
                  </div>
                </div>
              );
            });

            return items;
          })()}

          {status === 'PROCESSING' && (
            <div style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'flex-start' }}>
              <div style={{
                width: 28, height: 28, borderRadius: '50%', flexShrink: 0,
                background: 'linear-gradient(135deg, #3b82f6, #6366f1)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: 'Montserrat, sans-serif', fontWeight: 800,
                fontSize: 11, color: '#fff', marginTop: 2
              }}>F</div>
              <div style={{
                padding: '12px 16px', borderRadius: '16px 16px 16px 4px',
                background: '#f1f5f9', display: 'flex', gap: 4, alignItems: 'center'
              }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#94a3b8', animation: 'dotPulse 1.4s infinite', animationDelay: '0s' }}/>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#94a3b8', animation: 'dotPulse 1.4s infinite', animationDelay: '0.2s' }}/>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#94a3b8', animation: 'dotPulse 1.4s infinite', animationDelay: '0.4s' }}/>
              </div>
            </div>
          )}
          <div ref={chatEndRef} />
        </div>

        {/* Text input */}
        <form onSubmit={handleTextSend} style={{
          padding: '12px 24px 16px', borderTop: '1px solid #f1f5f9',
          display: 'flex', gap: 8
        }}>
          <input
            type="text"
            value={input}
            onChange={(e) => setInput(e.target.value)}
            placeholder="Type a message..."
            style={{
              flex: 1, padding: '11px 16px', borderRadius: 12,
              border: '1px solid #e5e7eb', fontFamily: 'Inter, sans-serif',
              fontSize: 14, outline: 'none', background: '#f8fafc',
              transition: 'border 0.2s, box-shadow 0.2s'
            }}
            onFocus={(e) => { e.target.style.borderColor = '#3b82f6'; e.target.style.boxShadow = '0 0 0 3px rgba(59,130,246,0.1)'; }}
            onBlur={(e) => { e.target.style.borderColor = '#e5e7eb'; e.target.style.boxShadow = 'none'; }}
          />
          <button type="submit" disabled={!input.trim()} style={{
            padding: '11px 18px', borderRadius: 12, border: 'none',
            background: input.trim() ? '#3b82f6' : '#e2e8f0',
            color: input.trim() ? '#fff' : '#94a3b8',
            fontFamily: 'Inter, sans-serif', fontWeight: 600, fontSize: 14,
            cursor: input.trim() ? 'pointer' : 'default',
            transition: 'all 0.2s'
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>

      {/* Global keyframes */}
      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }
        @keyframes dotPulse {
          0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
          40% { transform: scale(1); opacity: 1; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
